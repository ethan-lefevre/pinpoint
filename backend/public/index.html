<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PinPoint Michigan — Launching May 2026</title>
    <link rel="icon" type="image/svg+xml" href="/public/pinpoint_michigan_transparent_smooth.png" />
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background-color: #0f172a;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      .container {
        text-align: center;
        max-width: 600px;
        padding: 20px;
      }

      .logo {
        width: 300px;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 42px;
        margin: 10px 0;
      }

      .highlight {
        color: #60a5fa;
      }

      p {
        color: #cbd5e1;
        font-size: 16px;
      }

      .launch {
        margin-top: 20px;
        font-weight: bold;
      }

      .bar {
        margin-top: 30px;
        width: 100%;
        height: 10px;
        background-color: #1e293b;
        border-radius: 5px;
        overflow: hidden;
      }

      .bar-fill {
        width: 75%;
        height: 100%;
        background-color: #60a5fa;
        animation: load 2s infinite alternate;
      }

      @keyframes load {
        from { width: 70%; }
        to { width: 80%; }
      }

      .footer {
        margin-top: 25px;
        font-size: 14px;
        color: #94a3b8;
      }

      a {
        color: #60a5fa;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="/pplogo.png" alt="PinPoint Logo" class="logo" onerror="this.style.display='none'" />

      <h1><span class="highlight">PinPoint</span> Michigan</h1>
      <p>Michigan wrestling rankings and news. Rebuilt.</p>

      <div class="launch">Launching May 2026</div>

      <div class="bar">
        <div class="bar-fill"></div>
      </div>

      <div class="footer">
        Follow updates: <a href="https://instagram.com/pinpointmichigan" target="_blank">@pinpointmichigan</a>
      </div>
    </div>
  </body>
</html>
